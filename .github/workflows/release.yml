name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  release:
    name: Release packages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: write
      id-token: write

    outputs:
      mcp_released: ${{ steps.publish.outputs.mcp_released }}
      mcp_version: ${{ steps.publish.outputs.mcp_version }}
      cli_released: ${{ steps.publish.outputs.cli_released }}
      cli_version: ${{ steps.publish.outputs.cli_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Setup Node (npm >= 11.5.1 required for Trusted Publishing)
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Ensure npm supports Trusted Publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install

      - name: Build all packages
        run: bun run build

      - name: Publish packages
        id: publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PACKAGES=(
            "sdk:@elisym/sdk"
            "mcp:@elisym/mcp"
            "cli:@elisym/cli"
          )

          for entry in "${PACKAGES[@]}"; do
            DIR="${entry%%:*}"
            PKG_NAME="${entry##*:}"
            PKG_DIR="packages/${DIR}"

            VERSION=$(node -p "require('./${PKG_DIR}/package.json').version")
            TAG="${PKG_NAME}@${VERSION}"

            echo "--- Checking ${TAG} ---"

            if git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1; then
              echo "  Tag ${TAG} already exists. Skipping."
              continue
            fi

            echo "  Publishing ${PKG_NAME}@${VERSION} to npm..."
            cd "${PKG_DIR}"
            npm publish --provenance --access public
            cd "${GITHUB_WORKSPACE}"

            echo "  Creating git tag ${TAG}..."
            git tag "${TAG}"
            git push origin "${TAG}"

            echo "  Creating GitHub Release for ${TAG}..."
            gh release create "${TAG}" \
              --title "${TAG}" \
              --generate-notes \
              --verify-tag

            echo "  Done: ${TAG}"
            echo "${DIR}_released=true" >> "$GITHUB_OUTPUT"
            echo "${DIR}_version=${VERSION}" >> "$GITHUB_OUTPUT"
          done

  docker:
    name: Docker (${{ matrix.package }})
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.mcp_released == 'true' || needs.release.outputs.cli_released == 'true'

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - package: mcp
            image: ghcr.io/elisymlabs/mcp
            released: ${{ needs.release.outputs.mcp_released }}
            version: ${{ needs.release.outputs.mcp_version }}
          - package: cli
            image: ghcr.io/elisymlabs/cli
            released: ${{ needs.release.outputs.cli_released }}
            version: ${{ needs.release.outputs.cli_version }}

    steps:
      - name: Skip if not released
        if: matrix.released != 'true'
        run: echo "Skipping ${{ matrix.package }} - no new release" && exit 0

      - name: Checkout
        if: matrix.released == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Bun
        if: matrix.released == 'true'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Install and build
        if: matrix.released == 'true'
        run: |
          bun install
          bun run build

      - name: Setup Docker Buildx
        if: matrix.released == 'true'
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Login to GHCR
        if: matrix.released == 'true'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: matrix.released == 'true'
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: packages/${{ matrix.package }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ matrix.image }}:${{ matrix.version }}
            ${{ matrix.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  mcp-registry:
    name: Publish to MCP Registry
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.mcp_released == 'true'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install mcp-publisher
        env:
          MCP_PUBLISHER_VERSION: v1.7.9
          MCP_PUBLISHER_ASSET: mcp-publisher_linux_amd64.tar.gz
        run: |
          set -euo pipefail
          BASE_URL="https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}"
          CHECKSUMS_FILE="registry_${MCP_PUBLISHER_VERSION#v}_checksums.txt"

          echo "Downloading ${MCP_PUBLISHER_ASSET} (${MCP_PUBLISHER_VERSION})..."
          curl -fSL "${BASE_URL}/${MCP_PUBLISHER_ASSET}" -o "${MCP_PUBLISHER_ASSET}"
          curl -fSL "${BASE_URL}/${CHECKSUMS_FILE}" -o "${CHECKSUMS_FILE}"

          echo "Verifying SHA-256 checksum..."
          grep " ${MCP_PUBLISHER_ASSET}\$" "${CHECKSUMS_FILE}" | sha256sum --check --strict -

          echo "Checksum verified. Extracting..."
          tar xzf "${MCP_PUBLISHER_ASSET}"
          sudo mv mcp-publisher /usr/local/bin/

      - name: Sync server.json version with package.json
        run: node scripts/sync-server-version.mjs
        working-directory: packages/mcp

      - name: Authenticate with MCP Registry (OIDC)
        run: mcp-publisher login github-oidc
        working-directory: packages/mcp

      - name: Publish to MCP Registry
        run: mcp-publisher publish
        working-directory: packages/mcp
