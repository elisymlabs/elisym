global:
  scrape_interval: 5s
  evaluation_interval: 5s
  external_labels:
    stack: elisym-perf

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: provider
    static_configs:
      - targets: ['host.docker.internal:9464']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: provider

  - job_name: bridge
    static_configs:
      - targets: ['host.docker.internal:3030']
    metrics_path: /metrics
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: bridge
