startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      agentName:
        type: string
        description: "Name of an elisym agent identity (pre-created via 'npx @elisym/mcp init'). Reads config from ~/.elisym/<name>/elisym.yaml"
      passphrase:
        type: string
        description: 'Passphrase to decrypt encrypted agent configs (optional, required only if config was encrypted at init)'
  commandFunction: |-
    (config) => ({
      command: 'npx',
      args: ['-y', '@elisym/mcp'],
      env: {
        ...(config.agentName ? { ELISYM_AGENT: config.agentName } : {}),
        ...(config.passphrase ? { ELISYM_PASSPHRASE: config.passphrase } : {})
      }
    })
